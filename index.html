<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>风管加工料单</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Microsoft YaHei",sans-serif;background:#f0f2f5;min-height:100vh;padding:16px}
  .card{background:white;border-radius:12px;overflow:hidden;max-width:500px;margin:0 auto;box-shadow:0 2px 12px rgba(0,0,0,0.1)}
  .header{background:linear-gradient(135deg,#1a73e8,#6c5ce7);color:white;padding:20px;text-align:center}
  .header h1{font-size:18px;margin-bottom:6px}
  .header .sub{font-size:14px;opacity:0.9;word-break:break-all;max-width:100%}
  .row{display:flex;padding:14px 16px;border-bottom:1px solid #f0f0f0;align-items:flex-start}
  .row:last-child{border-bottom:none}
  .lbl{flex:0 0 100px;color:#888;font-size:13px;padding-top:1px}
  .val{flex:1;color:#222;font-size:15px;font-weight:500;word-break:break-all}
  .footer{text-align:center;padding:12px;color:#bbb;font-size:12px}
  .error{text-align:center;padding:40px;color:#e74c3c}
  .loading{text-align:center;padding:40px;color:#888}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="header">
    <h1>🏭 风管加工料单</h1>
    <div class="sub" id="title">加载中...</div>
  </div>
  <div id="rows"><div class="loading">正在加载...</div></div>
  <div class="footer">风管加工料单系统</div>
</div>

<script>
// 解析URL参数
(function() {
  var titleEl = document.getElementById('title');
  var rowsEl = document.getElementById('rows');
  
  var params = window.location.search;
  if (!params || params.length < 3) {
    titleEl.textContent = '无数据';
    rowsEl.innerHTML = '<div class="error">二维码数据为空</div>';
    return;
  }
  
  var match = params.match(/[?&]d=([^&]+)/);
  if (!match) {
    titleEl.textContent = '无数据';
    rowsEl.innerHTML = '<div class="error">未找到数据参数</div>';
    return;
  }
  
  var raw = match[1];
  
  try {
    // 修复UTF-8编码问题
    var jsonStr = decodeURIComponent(escape(atob(raw)));
    var data = JSON.parse(jsonStr);
    
    var title = data.id || data.label || '风管加工料单';
    titleEl.textContent = title;
    document.title = title;
    
    var html = '';
    
    if (data.info && Array.isArray(data.info)) {
      for (var i = 0; i < data.info.length; i++) {
        var item = data.info[i];
        var colonIdx = item.indexOf(':');
        var k = colonIdx > 0 ? item.substring(0, colonIdx) : '字段' + (i + 1);
        var v = colonIdx > 0 ? item.substring(colonIdx + 1) : item;
        html += '<div class="row"><div class="lbl">' + k + '</div><div class="val">' + v + '</div></div>';
      }
    } else if (data.d && typeof data.d === 'string') {
      // 新格式：编号|字段1:值1|字段2:值2|...
      var parts = data.d.split('|');
      for (var k = 0; k < parts.length; k++) {
        var colonIdx = parts[k].indexOf(':');
        var label = colonIdx > 0 ? parts[k].substring(0, colonIdx) : '字段' + (k + 1);
        var val = colonIdx > 0 ? parts[k].substring(colonIdx + 1) : parts[k];
        html += '<div class="row"><div class="lbl">' + label + '</div><div class="val">' + val + '</div></div>';
      }
    } else if (data.fields && Array.isArray(data.fields)) {
      for (var j = 0; j < data.fields.length; j++) {
        var f = data.fields[j];
        var k = f.k || f.label || '';
        var v = f.v || f.value || '-';
        html += '<div class="row"><div class="lbl">' + k + '</div><div class="val">' + v + '</div></div>';
      }
    }
    
    if (html) {
      rowsEl.innerHTML = html;
    } else {
      rowsEl.innerHTML = '<div class="error">暂无数据</div>';
    }
    
  } catch(e) {
    titleEl.textContent = '数据解析失败';
    rowsEl.innerHTML = '<div class="error">数据格式错误: ' + e.message + '</div>';
  }
})();
</script>
</body>
</html>
