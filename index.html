<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>风管加工料单查询</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Microsoft YaHei",sans-serif;background:#f0f2f5;min-height:100vh;padding:16px}
  .container{max-width:600px;margin:0 auto}
  .card{background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.1)}
  .header{background:linear-gradient(135deg,#1a73e8,#6c5ce7);color:white;padding:20px;text-align:center}
  .header h1{font-size:20px;margin-bottom:6px}
  .header .sub{font-size:14px;opacity:0.9}
  .content{padding:30px}
  .search-box{display:flex;gap:10px;margin-bottom:20px}
  .search-box input{flex:1;padding:12px;border:2px solid #ddd;border-radius:8px;font-size:16px}
  .search-box button{padding:12px 24px;background:#667eea;color:white;border:none;border-radius:8px;cursor:pointer;font-size:16px}
  .search-box button:hover{background:#5568d3}
  .result{margin-top:20px;display:none}
  .result.show{display:block}
  .result-title{font-size:18px;color:#333;margin-bottom:15px;padding-bottom:10px;border-bottom:2px solid #667eea}
  .row{display:flex;padding:12px 0;border-bottom:1px solid #f0f0f0}
  .row:last-child{border-bottom:none}
  .label{flex:0 0 120px;color:#666;font-size:14px}
  .value{flex:1;color:#222;font-size:15px;font-weight:500;word-break:break-all}
  .error{color:#e74c3c;padding:20px;text-align:center;background:#ffe8e8;border-radius:8px;display:none}
  .error.show{display:block}
  .loading{color:#888;text-align:center;padding:20px;display:none}
  .loading.show{display:block}
  .footer{text-align:center;padding:20px;color:#bbb;font-size:12px;border-top:1px solid #f0f0f0}
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="header">
      <h1>🏭 风管加工料单</h1>
      <div class="sub">扫码或输入编号查询</div>
    </div>
    
    <div class="content">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="输入项目编号或扫描二维码" autofocus>
        <button onclick="search()">查询</button>
      </div>
      
      <div class="loading" id="loading">加载中...</div>
      <div class="error" id="error"></div>
      <div class="result" id="result">
        <div class="result-title" id="resultTitle"></div>
        <div id="resultContent"></div>
      </div>
    </div>
    
    <div class="footer">风管加工料单系统</div>
  </div>
</div>

<script>
// 从URL获取初始编号
(function() {
  const params = new URLSearchParams(window.location.search);
  const d = params.get('d');
  if (d) {
    try {
      const data = JSON.parse(decodeURIComponent(escape(atob(d))));
      if (data.id) {
        document.getElementById('searchInput').value = data.id;
        search();
      }
    } catch(e) {
      console.log('URL decode error:', e.message);
    }
  }
})();

function search() {
  const input = document.getElementById('searchInput').value.trim();
  if (!input) {
    showError('请输入项目编号');
    return;
  }
  
  // 从localStorage获取数据（由主页面存储）
  const allData = localStorage.getItem('ductQrData');
  if (!allData) {
    showError('暂无数据。请先在主页面生成二维码。');
    return;
  }
  
  try {
    const data = JSON.parse(allData);
    const found = data.find(row => row.label === input);
    
    if (!found) {
      showError('未找到编号: ' + input);
      return;
    }
    
    showResult(found);
  } catch(e) {
    showError('数据格式错误: ' + e.message);
  }
}

function showResult(data) {
  document.getElementById('error').classList.remove('show');
  document.getElementById('loading').classList.remove('show');
  
  const result = document.getElementById('result');
  document.getElementById('resultTitle').textContent = data.label;
  
  let html = '';
  if (data.fields && Array.isArray(data.fields)) {
    for (let f of data.fields) {
      const k = f.k || f.label || '';
      const v = f.v || f.value || '-';
      html += '<div class="row"><div class="label">' + k + '</div><div class="value">' + v + '</div></div>';
    }
  }
  
  document.getElementById('resultContent').innerHTML = html;
  result.classList.add('show');
}

function showError(msg) {
  document.getElementById('result').classList.remove('show');
  document.getElementById('loading').classList.remove('show');
  const error = document.getElementById('error');
  error.textContent = msg;
  error.classList.add('show');
}

// 回车搜索
document.getElementById('searchInput').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') search();
});
</script>
</body>
</html>
